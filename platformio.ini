; PlatformIO Project Configuration File
;
; Builds the STM32CubeMX-generated HAL project in Core/ (not Arduino).
; HAL/CMSIS drivers come from PlatformIO's framework-stm32cubeg4 package;
; the local Drivers/ tree is only used by the standalone Makefile build.

[platformio]
src_dir = Core/Src
include_dir = Core/Inc

[env:nucleo_g474re]
platform = ststm32
board = nucleo_g474re
framework = stm32cube
board_build.ldscript = STM32G474XX_FLASH.ld
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32G474xx
